          { target: target || 'hash_0x9f3', type: 'Malware Hash', risk: 'MED', time: timeStr },
          { target: '2024-01-15', type: 'Campaign Date', risk: 'MED', time: timeStr }
        ],
        crypto: () => [
          { target: target.startsWith('bc1') ? target : 'bc1q' + 'xyz789...pqr234', type: 'BTC Wallet', risk: target.startsWith('bc1') ? 'HIGH' : 'MED', time: timeStr },
          { target: '0x742d...9f2a', type: 'ETH Address', risk: 'MED', time: timeStr },
          { target: 'Binance', type: 'Exchange Tag', risk: 'LOW', time: timeStr },
          { target: '2.847 BTC', type: 'Balance Found', risk: 'HIGH', time: timeStr }
        ],
        surface: () => [
          { target: 'login.corp.com', type: 'Admin Portal', risk: 'CRITICAL', time: timeStr },
          { target: '/api/v2/endpoints', type: 'API Discovery', risk: 'HIGH', time: timeStr },
          { target: 'robots.txt', type: 'Hidden Paths', risk: 'MED', time: timeStr },
          { target: 'Drupal 9.3.2', type: 'CMS Version', risk: 'MED', time: timeStr }
        ],
        social: () => [
          { target: '@' + (target.replace('@', '') || 'redirect7'), type: 'Twitter/X Handle', risk: 'MED', time: timeStr },
          { target: 'linkedin.com/in/john', type: 'LinkedIn', risk: 'LOW', time: timeStr },
          { target: 'GitHub: 47 repos', type: 'Code Presence', risk: 'LOW', time: timeStr },
          { target: 'Discord: 12 servers', type: 'Community Links', risk: 'MED', time: timeStr }
        ],
        breach: () => [
          { target: 'HaveIBeenPwned', type: 'Leak Check', risk: target.includes('@') ? 'CRITICAL' : 'MED', time: timeStr },
          { target: 'Collection #1-5', type: 'Password Breach', risk: 'HIGH', time: timeStr },
          { target: '2019-2024', type: 'Exposure Window', risk: 'MED', time: timeStr },
          { target: '2.3B records', type: 'Data Volume', risk: 'HIGH', time: timeStr }
        ],
        geospatial: () => [
          { target: '37.7749, -122.4194', type: 'Coordinates', risk: 'LOW', time: timeStr },
          { target: 'San Francisco, CA', type: 'Geolocation', risk: 'LOW', time: timeStr },
          { target: 'ISP: Comcast', type: 'ISP Mapping', risk: 'LOW', time: timeStr },
          { target: '±50m accuracy', type: 'Precision', risk: 'MED', time: timeStr }
        ]
      };
      return (templates[domain] || templates.identity)();
    }

    // --- Execute Scan with Orb Reaction ---
    async function executeScan() {
      const target = $('target-input').value.trim();
      if (!target) { $('target-input').focus(); return; }
      
      $('loading-indicator').style.display = 'block';
      $('scan-line').style.display = 'block';
      $('scan-line').style.opacity = '1';
      
      // Trigger orb animation
      triggerOrbScan();
      
      await new Promise(r => setTimeout(r, 1500 + Math.random() * 2000));
      
      const data = generateMockData(currentDomain, target);
      scanCount++;
      nodeCount += data.length;
      $('node-count').textContent = nodeCount;
      $('nodes-value').textContent = nodeCount;
      $('depth-value').textContent = Math.floor(50 + Math.random() * 50) + '%';
      $('total-scans').textContent = scanCount;
      $('threat-level').textContent = data.some(d => d.risk === 'CRITICAL') ? 'CRITICAL' : data.some(d => d.risk === 'HIGH') ? 'HIGH' : 'MED';
      $('threat-level').style.color = data.some(d => d.risk === 'CRITICAL') ? '#ff3366' : data.some(d => d.risk === 'HIGH') ? '#ffaa00' : '#00e5ff';
      
      $('empty-state').style.display = 'none';
      const tbody = $('data-body');
      
      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.style.cssText = 'border-bottom:1px solid rgba(0,229,255,0.04);transition:background 0.2s;cursor:default;';
        const riskColor = { CRITICAL: '#ff3366', HIGH: '#ffaa00', MED: '#00e5ff', LOW: '#00ff88' }[row.risk] || '#4a5568';
        tr.innerHTML = `<td style="padding:10px 12px;color:#4a5568;font-size:9px;">${row.time}</td><td style="padding:10px 12px;color:#e2e8f0;">${row.target}</td><td style="padding:10px 12px;color:#6b7b96;">${row.type}</td><td style="padding:10px 12px;"><span style="padding:2px 6px;border-radius:4px;background:${riskColor}20;color:${riskColor};font-size:9px;font-weight:600;">${row.risk}</span></td>`;
        tbody.insertBefore(tr, tbody.firstChild);
        filterData();
      });
      
      $('loading-indicator').style.display = 'none';
      $('scan-line').style.opacity = '0';
      setTimeout(() => $('scan-line').style.display = 'none', 300);
    }

    // --- Filter Data ---
    function filterData() {
      const filter = $('data-filter').value;
      Array.from($('data-body').children).forEach(row => {
        const risk = row.querySelector('span')?.textContent || 'LOW';
        row.style.display = (filter === 'all' || risk === filter) ? '' : 'none';
      });
    }

    // =============================
    // WEBGL ORB WITH MORPHING CANVAS
    // =============================
    
    let scene, camera, renderer, points, uniforms;
    let currentShape = 0;
    let shapeNames = ['ASTROLABE', 'DNA HELIX', 'CORE PULSE', 'NEURAL NET', 'DATA STREAM'];
    let orbStats = { nodes: 0, pulse: 1.0 };
    
    // Orb shapes - GLSL vertex modifications
    const orbShapes = {
      astrolabe: `
        float a = position.x * 0.5 + uTime * 0.3;
        float r = 1.0 + sin(a * 3.0) * 0.3 + cos(position.y * 5.0) * 0.2;
        float x = r * cos(a) * (1.0 + position.z * 0.1);
        float y = r * sin(a) * (1.0 + position.z * 0.1);
        float z = position.y * 0.5 + sin(uTime + a) * 0.2;
        vec3 newPos = vec3(x, y, z);
        vColor = mix(uColorA, uColorB, sin(a + uTime) * 0.5 + 0.5);
      `,
      dna: `
        float t = position.x * 2.0 + uTime * 0.5;
        float phase = position.y * 3.14159;
        float r = 0.8 + position.z * 0.3;
        float x = r * cos(t + phase);
        float y = position.x * 1.5;
        float z = r * sin(t + phase);
        vec3 newPos = vec3(x, y, z);
        vColor = mix(uColorA, uColorB, sin(phase + uTime) * 0.5 + 0.5);
      `,
      heart: `
        float a = position.x * 6.28318;
        float r = 0.5 + 0.4 * (1.0 + sin(a)) * (1.0 + 0.9 * cos(a)) / (1.0 + cos(a));
        r += sin(uTime * 2.0) * 0.1;
        float x = r * cos(a) * 1.2;
        float y = r * sin(a) * 1.2;
        float z = position.y * 0.3 + sin(uTime * 3.0 + a) * 0.15;
        vec3 newPos = vec3(x, y, z);
        vColor = mix(vec3(1.0, 0.2, 0.4), vec3(1.0, 0.6, 0.8), sin(uTime + a) * 0.5 + 0.5);
      `,
      network: `
        vec3 grid = floor(position * 3.0) / 3.0;
        vec3 newPos = grid * 2.0 + sin(grid * 5.0 + uTime) * 0.2;
        newPos += (position - grid) * 0.3;
        float con = sin(grid.x * 10.0 + uTime) * sin(grid.y * 10.0 + uTime) * sin(grid.z * 10.0 + uTime);
        vColor = mix(uColorA, uColorB, con * 0.5 + 0.5);
      `,
      stream: `
        float t = uTime * 0.8;
        float x = position.x * 2.0;
        float y = mod(position.y + t, 2.0) - 1.0;
        float z = sin(position.x * 10.0 + t * 2.0) * 0.3 + cos(y * 5.0) * 0.2;
        z += position.z * 0.5;
        vec3 newPos = vec3(x, y, z);
        float stream = sin(position.x * 20.0 - t * 3.0);
        vColor = mix(vec3(0.0, 1.0, 0.3), vec3(0.0, 0.5, 1.0), stream * 0.5 + 0.5);
      `
    };
    
    const shapeKeys = Object.keys(orbShapes);
    
    function initOrb() {
      const container = $('orb-container');
      const width = container.clientWidth;
      const height = container.clientHeight;
      
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
      camera.position.z = 3;
      
      renderer = new THREE.WebGLRenderer({ 
        canvas: $('orb-canvas'),
        antialias: true,
        alpha: true 
      });
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      
      // Create particle system
      const particleCount = 50000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const randoms = new Float32Array(particleCount);
      
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 2;
        positions[i3 + 1] = (Math.random() - 0.5) * 2;
        positions[i3 + 2] = (Math.random() - 0.5) * 2;
        randoms[i] = Math.random();
      }
      
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
      
      uniforms = {
        uTime: { value: 0 },
        uPulse: { value: 0 },
        uMouse: { value: new THREE.Vector3(0, 0, 0) },
        uColorA: { value: new THREE.Color('#00e5ff') },
        uColorB: { value: new THREE.Color('#a855f7') },
        uShape: { value: 0 }
      };
      
      const material = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: `
          uniform float uTime;
          uniform float uPulse;
          uniform float uShape;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform vec3 uMouse;
          attribute float aRandom;
          varying vec3 vColor;
          varying float vAlpha;
          
          void main() {
            vec3 position = position * (1.0 + uPulse * 0.3);
            
            // Shape morphing logic
            int shapeIdx = int(floor(uShape));
            vec3 newPos = position;
            
            if (shapeIdx == 0) {
              ${orbShapes.astrolabe}
            } else if (shapeIdx == 1) {
              ${orbShapes.dna}
            } else if (shapeIdx == 2) {
              ${orbShapes.heart}
            } else if (shapeIdx == 3) {
              ${orbShapes.network}
            } else {
              ${orbShapes.stream}
            }
            
            vec4 mvPosition = modelViewMatrix * vec4(newPos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            float size = 2.0 + aRandom * 3.0 + uPulse * 5.0;
            gl_PointSize = size * (30.0 / -mvPosition.z);
            vAlpha = 0.4 + aRandom * 0.6 + uPulse * 0.4;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          varying float vAlpha;
          uniform float uTime;
          
          void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            
            float glow = 1.0 - dist * 2.0;
            glow = pow(glow, 1.5);
            
            gl_FragColor = vec4(vColor * (1.0 + glow * 0.5), vAlpha * glow);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      
      points = new THREE.Points(geometry, material);
      scene.add(points);
      
      $('orb-particles').textContent = (particleCount / 1000).toFixed(0) + 'K PARTICLES';
      $('orb-particles').style.opacity = '1';
      
      // Mouse interaction
      container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        uniforms.uMouse.value.x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
        uniforms.uMouse.value.y = -((e.clientY - rect.top) / rect.height - 0.5) * 2;
      });
      
      // Resize handler
      window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
      
      animate();
      
      // Auto morph shapes
      setInterval(() => {
        if (uniforms.uPulse.value < 0.1) {
          currentShape = (currentShape + 1) % shapeKeys.length;
          uniforms.uShape.value = currentShape;
          $('orb-shape-name').textContent = shapeNames[currentShape];
          $('orb-shape-name').style.opacity = '1';
          setTimeout(() => $('orb-shape-name').style.opacity = '0', 2000);
        }
      }, 8000);
    }
    
    function animate() {
      requestAnimationFrame(animate);
      
      if (uniforms) {
        uniforms.uTime.value += 0.01;
        
        // Pulse decay
        if (uniforms.uPulse.value > 0) {
          uniforms.uPulse.value *= 0.95;
        }
        
        // Rotate slowly
        points.rotation.y += 0.002;
        points.rotation.x += 0.001;
        
        $('freq-value').textContent = (1.0 + uniforms.uPulse.value * 2.0).toFixed(1);
      }
      
      renderer.render(scene, camera);
    }
    
    function triggerOrbScan() {
      if (!uniforms) return;
      
      // Random shape on scan
      currentShape = Math.floor(Math.random() * shapeKeys.length);
      uniforms.uShape.value = currentShape;
      
      // Trigger pulse
      uniforms.uPulse.value = 1.0;
      
      // Update display
      $('orb-shape-name').textContent = shapeNames[currentShape];
      $('orb-shape-name').style.opacity = '1';
      $('scan-line').style.display = 'block';
      $('scan-line').style.opacity = '1';
      
      setTimeout(() => {
        $('orb-shape-name').style.opacity = '0';
        $('scan-line').style.opacity = '0';
      }, 1500);
    }

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof THREE === 'undefined') {
        console.error('THREE.js not loaded!');
        return;
      }
      initOrb();
    });
  </script>
